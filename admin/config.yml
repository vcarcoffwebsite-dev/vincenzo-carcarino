# ==============================================================
#  Decap CMS — Vincenzo Carcarino
#  Backend: GitHub (commit diretti su repo)
#  Media: /static/uploads
# ==============================================================


backend:
  name: github
  repo: vcarcoffwebsite-dev/vincenzo-carcarino
  branch: main
  auth_type: implicit
  app_id: TUO_GITHUB_OAUTH_APP_ID

media_folder: static/uploads
public_folder: /static/uploads

locale: it

# ==============================================================
#  COLLEZIONI
# ==============================================================
collections:

  # ------------------------------------------------------------
  #  IMPOSTAZIONI GLOBALI
  # ------------------------------------------------------------
  - name: impostazioni
    label: "⚙️ Impostazioni"
    files:
      - name: impostazioni
        label: "Impostazioni sito"
        file: content/impostazioni.json
        format: json
        fields:
          - { label: "Nome artista",   name: nome_artista, widget: string, default: "Vincenzo Carcarino" }
          - { label: "Tagline hero",   name: tagline,      widget: text,   required: false }
          - { label: "Foto hero (sfondo)", name: hero_image, widget: image, required: false }
          - { label: "Foto profilo (bio)", name: profile_image, widget: image, required: false }
          - label: "Tema grafico"
            name: tema
            widget: select
            options:
              - { label: "Nero / Oro (default)", value: nero-oro }
              - { label: "Bianco / Blu notte",   value: bianco-blu }
              - { label: "Sabbia / Terracotta",  value: sabbia-terracotta }
              - { label: "Bianco / Nero Retrò",  value: retro }
          - label: "Biografia"
            name: biografia
            widget: object
            fields:
              - { label: "Paragrafo 1", name: p1, widget: text, required: false }
              - { label: "Paragrafo 2", name: p2, widget: text, required: false }
              - { label: "Paragrafo 3", name: p3, widget: text, required: false }
          - label: "Link piattaforme"
            name: links
            widget: object
            fields:
              - { label: "Spotify",      name: spotify,   widget: string, required: false }
              - { label: "YouTube",      name: youtube,   widget: string, required: false }
              - { label: "Amazon Music", name: amazon,    widget: string, required: false }
              - { label: "Facebook",     name: facebook,  widget: string, required: false }
              - { label: "Apple Music",  name: apple,     widget: string, required: false }
              - { label: "Instagram",    name: instagram, widget: string, required: false }
          - label: "Contatti"
            name: contatti
            widget: object
            fields:
              - { label: "Email di ricezione", name: email, widget: string }
              - { label: "Testo sotto email",  name: testo, widget: string, required: false }
              - { label: "hCaptcha Site Key",  name: hcaptcha_key, widget: string, required: false }

  # ------------------------------------------------------------
  #  MUSICA
  # ------------------------------------------------------------
  - name: musica
    label: "🎵 Musica"
    folder: content/musica
    create: true
    slug: "{{slug}}"
    identifier_field: title
    fields:
      - { label: "Titolo",      name: title,       widget: string }
      - { label: "Ordine",      name: order,       widget: number, default: 99 }
      - label: "Tipo"
        name: tipo
        widget: select
        options:
          - { label: "Audio (MP3)", value: audio   }
          - { label: "Video YouTube", value: youtube }
      - { label: "File audio (MP3)",  name: audio_file,   widget: file,   required: false }
      - { label: "Copertina audio",   name: cover,        widget: image,  required: false }
      - { label: "URL YouTube",       name: youtube_url,  widget: string, required: false }
      - { label: "Anno",              name: anno,         widget: number, required: false }
      - { label: "Descrizione",       name: descrizione,  widget: text,   required: false }

  # ------------------------------------------------------------
  #  EVENTI
  # ------------------------------------------------------------
  - name: eventi
    label: "🗓 Eventi"
    folder: content/eventi
    create: true
    slug: "{{slug}}"
    identifier_field: title
    fields:
      - { label: "Nome evento",   name: title,      widget: string }
      - { label: "Data",          name: data,       widget: datetime, format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: "Ora",           name: ora,        widget: string,  required: false, hint: "es. 21:00" }
      - { label: "Indirizzo",     name: indirizzo,  widget: string,  required: false }
      - { label: "Note",          name: note,       widget: text,    required: false }
      - { label: "Immagine",      name: immagine,   widget: image,   required: false }
      - { label: "Link biglietti",name: ticket_url, widget: string,  required: false }

  # ------------------------------------------------------------
  #  DISCOGRAFIA
  # ------------------------------------------------------------
  - name: discografia
    label: "💿 Discografia"
    folder: content/discografia
    create: true
    slug: "{{slug}}"
    identifier_field: title
    fields:
      - { label: "Titolo",     name: title,       widget: string }
      - label: "Tipo"
        name: tipo
        widget: select
        options:
          - { label: "Singolo", value: Singolo }
          - { label: "Album",   value: Album   }
          - { label: "EP",      value: EP      }
      - { label: "Anno",       name: anno,        widget: number, required: false }
      - { label: "Copertina",  name: copertina,   widget: image,  required: false }
      - { label: "Link Spotify", name: spotify_url, widget: string, required: false }
      - { label: "Link YouTube", name: youtube_url, widget: string, required: false }

  # ------------------------------------------------------------
  #  VIDEO GALLERY
  # ------------------------------------------------------------
  - name: video
    label: "🎬 Video Gallery"
    folder: content/video
    create: true
    slug: "{{slug}}"
    identifier_field: title
    fields:
      - { label: "Titolo",      name: title,       widget: string }
      - { label: "URL YouTube", name: youtube_url, widget: string }
      - { label: "Ordine",      name: order,       widget: number, default: 99 }
      - { label: "Descrizione", name: descrizione, widget: text,   required: false }

  # ------------------------------------------------------------
  #  RASSEGNA STAMPA
  # ------------------------------------------------------------
  - name: stampa
    label: "📰 Rassegna Stampa"
    folder: content/stampa
    create: true
    slug: "{{slug}}"
    identifier_field: testata
    fields:
      - { label: "Testata",   name: testata,  widget: string }
      - { label: "Estratto",  name: estratto, widget: text   }
      - { label: "Data",      name: data,     widget: datetime, format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: "Logo testata", name: logo,  widget: image,  required: false }
      - { label: "Link articolo",name: url,   widget: string, required: false }

  # ------------------------------------------------------------
  #  GALLERY FOTO
  # ------------------------------------------------------------
  - name: gallery
    label: "📸 Gallery Foto"
    folder: content/gallery
    create: true
    slug: "{{slug}}"
    identifier_field: title
    fields:
      - { label: "Titolo/Alt",  name: title, widget: string }
      - { label: "Foto",        name: foto,  widget: image  }
      - { label: "Ordine",      name: order, widget: number, default: 99 }

  # ------------------------------------------------------------
  #  COLLABORATORI / CREDITS
  # ------------------------------------------------------------
  - name: collaboratori
    label: "🤝 Collaboratori"
    folder: content/collaboratori
    create: true
    slug: "{{slug}}"
    identifier_field: title
    fields:
      - { label: "Nome",        name: title,      widget: string }
      - { label: "Ruolo",       name: ruolo,      widget: string }
      - { label: "Descrizione", name: descrizione,widget: text,   required: false }
      - { label: "Foto",        name: foto,       widget: image,  required: false }
      - { label: "Link profilo",name: url,        widget: string, required: false }
      - { label: "Ordine",      name: order,      widget: number, default: 99 }

  # ------------------------------------------------------------
  #  SHOP
  # ------------------------------------------------------------
  - name: shop
    label: "🛒 Shop"
    folder: content/shop
    create: true
    slug: "{{slug}}"
    identifier_field: title
    fields:
      - { label: "Nome prodotto",  name: title,       widget: string }
      - label: "Tipo"
        name: tipo
        widget: select
        options:
          - { label: "CD",          value: CD          }
          - { label: "Vinile",      value: Vinile      }
          - { label: "Merchandise", value: Merchandise }
          - { label: "Altro",       value: Altro       }
      - { label: "Prezzo (€)",      name: prezzo,      widget: number }
      - { label: "Descrizione",     name: descrizione, widget: text,   required: false }
      - { label: "Foto prodotto",   name: foto,        widget: image,  required: false }
      - { label: "Link PayPal",     name: paypal_url,  widget: string, required: false, hint: "Usa il pulsante 'Buy Now' di PayPal" }
      - { label: "Disponibile",     name: disponibile, widget: boolean, default: true }
      - { label: "Ordine",          name: order,       widget: number, default: 99 }
